name: Build and Test Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Application
        run: echo "Building the application..."

  test:
    runs-on: ubuntu-latest
    needs: build   # 👈 Dependency (test runs after build)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Tests
        run: echo "Running tests..."
