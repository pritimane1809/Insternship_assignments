name: PR Build and Test Workflow

on:
  pull_request:
    branches:
      - main   # triggers when PR is created/updated targeting main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Step
        run: echo "Building the application..."

  test:
    runs-on: ubuntu-latest
    needs: build   # 👈 ensures test runs after build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Test Step
        run: echo "Running tests..."